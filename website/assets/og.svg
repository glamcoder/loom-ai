<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFCE6B"/><stop offset="0.5" stop-color="#F5A623"/><stop offset="1" stop-color="#FF7A59"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0" r="1">
      <stop stop-color="#F5A623" stop-opacity="0.18"/><stop offset="1" stop-color="#0a0b0f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="1" cy="0" r="1">
      <stop stop-color="#7C8CFF" stop-opacity="0.16"/><stop offset="1" stop-color="#0a0b0f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0a0b0f"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- woven mark -->
  <g transform="translate(96,150)">
    <rect x="2" y="2" width="120" height="120" rx="28" stroke="url(#lg)" stroke-width="3" opacity="0.5"/>
    <path d="M28 34V90M52 34V90M76 34V90M100 34V90" stroke="url(#lg)" stroke-width="6" stroke-linecap="round"/>
    <path d="M22 50H106M22 74H106" stroke="#7C8CFF" stroke-width="6" stroke-linecap="round" opacity="0.95"/>
  </g>

  <text x="96" y="360" font-family="Inter, sans-serif" font-size="92" font-weight="700" fill="#e8eaf0" letter-spacing="-3">Loom</text>
  <text x="96" y="424" font-family="Inter, sans-serif" font-size="38" font-weight="600" fill="#F5A623">Make for AI workflows.</text>
  <text x="96" y="486" font-family="Inter, sans-serif" font-size="27" font-weight="400" fill="#a4a9bd">A Git-native workflow language for packaging reusable AI work as code.</text>
  <text x="96" y="524" font-family="Inter, sans-serif" font-size="27" font-weight="400" fill="#a4a9bd">Artifacts, traces, and deterministic tests — no LLM calls, no network.</text>

  <g font-family="JetBrains Mono, monospace" font-size="22" fill="#6f7589">
    <text x="96" y="586">$ npm i -g loom-ai</text>
    <text x="360" y="586" fill="#5ee0a0">·  v0.1.0 deterministic preview</text>
  </g>
