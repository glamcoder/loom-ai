name: Website

on:
  # Build the site on every push and PR so a broken site can't merge — but
  # only when something the site is built from actually changed.
  push:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "examples/**"
      - ".github/workflows/website.yml"
  pull_request:
    paths:
      - "website/**"
      - "docs/**"
      - "examples/**"
      - ".github/workflows/website.yml"
  # Allow manual redeploys from the Actions tab (ignores the path filters).
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let a newer push supersede an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Check internal links
        working-directory: website
        run: npm run check

      - name: Upload Pages artifact
        # Only the production build (push to main / manual) needs the artifact;
        # PRs just need build + link-check to pass above.
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    # Deploy only after a merge/push to main (not on PRs).
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
